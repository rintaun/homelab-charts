name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - docker/**
  pull_request:
    paths:
      - docker/**
  workflow_dispatch:

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed docker subdirectories
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — build every image.
            images=$(find docker -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            images=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- docker/ \
              | grep '^docker/' | cut -d/ -f2 | sort -u)
          else
            images=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- docker/ \
              | grep '^docker/' | cut -d/ -f2 | sort -u)
          fi
          matrix=$(echo "${images}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.image }}
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract app version
        id: version
        run: |
          version=$(grep '^ARG APP_VERSION=' docker/${{ matrix.image }}/Dockerfile | cut -d= -f2)
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
