name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags:
      - '*-v*'
    paths:
      - docker/**
  pull_request:
    paths:
      - docker/**
  workflow_dispatch:

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed docker subdirectories
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — build every image.
            images=$(find docker -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort)
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^(.+)-v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              images="${BASH_REMATCH[1]}"
            else
              echo "Unsupported image release tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- docker/)
            images=$(echo "$changed" | grep '^docker/[^/]\+/' | cut -d/ -f2 | sort -u)
          else
            changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- docker/)
            images=$(echo "$changed" | grep '^docker/[^/]\+/' | cut -d/ -f2 | sort -u)
          fi
          matrix=$(echo "${images}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  prepare:
    runs-on: ubuntu-latest
    needs:
      - detect
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate matrix
        id: generate
        uses: docker/bake-action/subaction/matrix@v7
        with:
          workdir: ./docker/${{ matrix.image }}
          target: ${{ matrix.image }}
          fields: platforms,matrix

  build:
    name: ${{ matrix.image }}
    needs:
      - detect
      - prepare
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    runs-on: ${{ startsWith(matrix.platforms, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},match=^${{ matrix.image }}-v([0-9]+\.[0-9]+\.[0-9]+(?:[.-][0-9A-Za-z.-]+)?)$,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern=v{{major}}.{{minor}},match=^${{ matrix.image }}-v([0-9]+\.[0-9]+\.[0-9]+(?:[.-][0-9A-Za-z.-]+)?)$,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern=v{{major}},match=^${{ matrix.image }}-v([0-9]+\.[0-9]+\.[0-9]+(?:[.-][0-9A-Za-z.-]+)?)$,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-v0.') }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push with Bake
        uses: docker/bake-action@v6
        with:
          source: "./docker/${{ matrix.image }}"
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.cache-from=type=gha,scope=${{ matrix.image }}
            *.cache-to=type=gha,mode=max,scope=${{ matrix.image }}
            *.platform=${{ matrix.platforms }}
            *.args=${{ matrix.args }}

  tag-release:
    name: Create image release tags
    needs:
      - detect
      - build
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tags for VERSION bumps
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          matrix='${{ needs.detect.outputs.matrix }}'
          tags_to_push=0

          for image in $(echo "$matrix" | jq -r '.[]'); do
            version_file="docker/${image}/VERSION"

            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$version_file" | grep -q .; then
              tags_to_push=1
              break
            fi
          done

          if [ "$tags_to_push" -eq 1 ] && [ -z "$RELEASE_TOKEN" ]; then
            echo "RELEASE_TOKEN secret is required to push release tags that trigger tag workflows" >&2
            exit 1
          fi

          if [ "$tags_to_push" -eq 0 ]; then
            echo "No VERSION bumps detected; no release tags created"
            exit 0
          fi

          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

          for image in $(echo "$matrix" | jq -r '.[]'); do
            version_file="docker/${image}/VERSION"

            if ! git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$version_file" | grep -q .; then
              continue
            fi

            if [ ! -f "$version_file" ]; then
              echo "Missing VERSION file for image: $image" >&2
              exit 1
            fi

            version=$(tr -d '[:space:]' < "$version_file")

            if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
              echo "Invalid semver in $version_file: $version" >&2
              exit 1
            fi

            tag="${image}-v${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Release tag already exists: ${tag}" >&2
              exit 1
            fi

            git tag -a "$tag" -m "Release ${image} ${version}"
            git push origin "refs/tags/${tag}"
          done
