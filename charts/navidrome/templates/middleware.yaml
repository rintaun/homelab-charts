{{- if .Values.oidcMiddleware.providerURL }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "navidrome.fullname" . }}-oidc-auth
  labels:
    {{- include "navidrome.labels" . | nindent 4 }}
spec:
  plugin:
    traefikoidc:
      providerURL: {{ .Values.oidcMiddleware.providerURL | quote }}
      clientID: {{ .Values.oidcMiddleware.clientId | quote }}
      # urn:k8s:secret:<secret-name>:<key> — Traefik reads the secret from the middleware's namespace.
      clientSecret: "urn:k8s:secret:{{ include "navidrome.secretName" . }}:oidc-client-secret"
      sessionEncryptionKey: "urn:k8s:secret:{{ include "navidrome.secretName" . }}:session-encryption-key"
      callbackURL: {{ .Values.oidcMiddleware.callbackURL | quote }}
      {{- with .Values.oidcMiddleware.excludedURLs }}
      excludedURLs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oidcMiddleware.cookieDomain }}
      cookieDomain: {{ . | quote }}
      {{- end }}
      sessionMaxAge: {{ .Values.oidcMiddleware.sessionMaxAge }}
      headers:
        - name: {{ .Values.navidrome.extAuth.userHeader | quote }}
          value: {{ printf "{{.Claims.%s}}" .Values.oidcMiddleware.userClaim | quote }}
{{- end }}
