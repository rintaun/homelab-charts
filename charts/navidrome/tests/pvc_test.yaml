suite: navidrome persistence tests
templates:
  - pvc.yaml
tests:
  - it: should render a data PVC by default
    asserts:
      - containsDocument:
          kind: PersistentVolumeClaim
          apiVersion: v1

  - it: should render a music PVC by default
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render a PV when nfs.server is not set
    asserts:
      - hasDocuments:
          count: 2

  - it: should render a PV when music nfs server is set
    set:
      persistence.music.volume.nfs.server: nfs.example.com
      persistence.music.volume.nfs.path: /mnt/music
    asserts:
      - hasDocuments:
          count: 3

  - it: should set NFS server on the PV
    set:
      persistence.music.volume.nfs.server: nfs.example.com
      persistence.music.volume.nfs.path: /mnt/music
    documentIndex: 0
    asserts:
      - equal:
          path: spec.nfs.server
          value: nfs.example.com

  - it: should set empty storageClassName on music PVC when NFS is set
    set:
      persistence.music.volume.nfs.server: nfs.example.com
      persistence.music.volume.nfs.path: /mnt/music
    documentIndex: 1
    asserts:
      - equal:
          path: spec.storageClassName
          value: ""

  - it: should not render music PVC when existingClaimName is set
    set:
      persistence.music.existingClaimName: my-music-pvc
    asserts:
      - hasDocuments:
          count: 1
