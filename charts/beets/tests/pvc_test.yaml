suite: beets persistence tests
templates:
  - pvc.yaml
tests:
  - it: should render a data PVC by default
    asserts:
      - containsDocument:
          kind: PersistentVolumeClaim
          apiVersion: v1

  - it: should render a media PVC by default
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render a PV when nfs.server is not set
    asserts:
      - hasDocuments:
          count: 2

  - it: should render a PV and PVC when media nfs server is set
    set:
      persistence.media.volume.nfs.server: nfs.example.com
      persistence.media.volume.nfs.path: /mnt/media
    asserts:
      - hasDocuments:
          count: 3

  - it: should set NFS server on the PV when specified
    set:
      persistence.media.volume.nfs.server: nfs.example.com
      persistence.media.volume.nfs.path: /mnt/media
    documentIndex: 1
    asserts:
      - equal:
          path: spec.nfs.server
          value: nfs.example.com
