suite: beets configmap tests
templates:
  - configmap.yaml
tests:
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap

  - it: should include config.yaml data key
    asserts:
      - isNotNull:
          path: data["config.yaml"]

  - it: should render provided config content
    set:
      config: "library: /music/beets.db"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "library"
