suite: beets configmap tests
templates:
  - configmap.yaml
tests:
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap

  - it: should include config data key
    asserts:
      - isNotNullOrEmpty:
          path: data

  - it: should render provided config content
    set:
      config: "library: /music/beets.db"
    asserts:
      - isNotNullOrEmpty:
          path: data
