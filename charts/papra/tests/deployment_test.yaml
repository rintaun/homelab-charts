suite: papra deployment tests
templates:
  - deployment.yaml
tests:
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should use Recreate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the image correctly
    set:
      image.repository: papra/papra
      image.tag: "1.0.0-rootless"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "papra/papra:1.0.0-rootless"

  - it: should reference auth secret for AUTH_SECRET
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-papra
                key: auth-secret

  - it: should set S3 bucket env var when storage driver is s3
    set:
      config.storage.driver: s3
      config.storage.s3.bucket: my-bucket
      config.storage.s3.region: us-east-1
      config.storage.s3.endpoint: https://s3.example.com
      config.storage.s3.forcePathStyle: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOCUMENT_STORAGE_S3_BUCKET_NAME
            value: my-bucket
          any: true

  - it: should not set S3 env vars when storage driver is filesystem
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOCUMENT_STORAGE_S3_BUCKET_NAME
          any: true
