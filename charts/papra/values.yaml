# nameOverride overrides the chart name used in resource names.
nameOverride: ""
# fullnameOverride overrides the full resource name (release-chart).
fullnameOverride: ""

# replicaCount is the number of pod replicas to run.
replicaCount: 1

image:
  # repository is the container image repository.
  repository: ghcr.io/papra-hq/papra
  # tag overrides the chart appVersion when set.
  tag: "26.4.0-rootless"
  # digest pins to an immutable image reference. Prepend sha256: or omit the prefix.
  digest: ""
  # pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

serviceAccount:
  # create specifies whether a ServiceAccount should be created.
  create: true
  # annotations to add to the ServiceAccount.
  annotations: {}
  # name overrides the generated name when set.
  name: ""

podAnnotations: {}

# podSecurityContext sets the security context for the pod.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# securityContext sets the security context for the papra container.
# readOnlyRootFilesystem is false because papra writes to /app/app-data at runtime.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  # port is the HTTP port papra listens on.
  port: 1221

ingress:
  # enabled controls whether an Ingress resource is created. Set to false to expose the service
  # via other means (e.g. LoadBalancer, NodePort, service mesh).
  enabled: true
  # host is the fully-qualified hostname for the ingress. Leave empty to skip ingress creation.
  host: ""
  # className is the IngressClass to use. Empty string uses the cluster's default IngressClass.
  className: ""
  # annotations are added to the Ingress resource metadata.
  annotations: {}

# persistence configures the PVC for /app/app-data (SQLite DB + local document storage).
persistence:
  # storageClass is the Kubernetes storage class to use. Empty string uses the cluster default.
  storageClass: ""
  # size is the PVC capacity.
  size: 20Gi

config:
  # appBaseUrl is the full public URL of the Papra instance (required).
  appBaseUrl: ""
  auth:
    # isRegistrationEnabled controls whether new users can self-register.
    isRegistrationEnabled: false
    # firstUserAsAdmin promotes the first registered user to admin.
    firstUserAsAdmin: true
    # ipAddressHeaders lists headers used to determine the client IP (for reverse proxy setups).
    ipAddressHeaders: x-forwarded-for
    # customOAuthProviders configures custom OAuth/OIDC providers (AUTH_PROVIDERS_CUSTOMS).
    # Client secrets are provided via oidcSecret/oidcExternalSecret below.
    # See https://www.better-auth.com/docs/plugins/generic-oauth#configuration for field details.
    # Example:
    #   - id: my-provider
    #     name: "My Provider"
    #     clientId: "my-client-id"
    #     discoveryUrl: "https://auth.example.com/.well-known/openid-configuration"
    #     scopes:
    #       - openid
    #       - profile
    #       - email
    customOAuthProviders: []
  storage:
    # driver is the document storage backend. One of: "filesystem", "s3".
    driver: filesystem
    # s3 settings are only used when driver=s3.
    s3:
      # bucket is the S3 bucket name.
      bucket: papra
      # region is the S3 region.
      region: us-east-1
      # endpoint is the S3-compatible endpoint URL. Leave empty to use the default AWS endpoint.
      endpoint: ""
      # forcePathStyle enables path-style S3 addressing (required for MinIO and most self-hosted S3).
      forcePathStyle: false

# secret configures the AUTH_SECRET credential.
secret:
  # create controls whether the chart creates the Secret.
  # Defaults to false — provide a pre-existing Secret via secretName instead,
  # or set create=true and supply values below only for local/dev use.
  create: false
  # secretName overrides the generated Secret name when set.
  # When create=false, this must name the pre-existing Secret to use.
  # Defaults to the chart fullname when empty.
  secretName: ""
  # authSecret is used when create=true. Must be at least 32 characters.
  authSecret: ""

# s3Secret configures the S3 credentials (only used when config.storage.driver=s3).
s3Secret:
  # create controls whether the chart creates the S3 Secret.
  # Defaults to false — provide a pre-existing Secret via secretName instead,
  # or set create=true and supply values below only for local/dev use.
  create: false
  # secretName overrides the generated Secret name when set.
  # Defaults to <fullname>-s3 when empty.
  secretName: ""
  # accessKeyId and secretAccessKey are used when create=true.
  accessKeyId: ""
  secretAccessKey: ""

# oidcSecret configures how custom OAuth provider client secrets are provided.
# The generated Secret holds one key per provider: <providerId>-client-secret.
oidcSecret:
  # create controls whether the chart creates the OIDC Secret.
  # Defaults to false — provide a pre-existing Secret via secretName instead,
  # or set create=true and supply values below only for local/dev use.
  create: false
  # secretName overrides the generated Secret name when set.
  # Defaults to <fullname>-oidc when empty.
  secretName: ""
  # clientSecrets is used when create=true. Map of providerId -> clientSecret.
  clientSecrets: {}

# ingestionFolder configures Papra's built-in ingestion folder feature.
# Papra watches <mountPath>/<org-id>/ for files to automatically ingest.
# Find your org ID in the Papra UI under Settings → Organization.
ingestionFolder:
  # enabled turns on the ingestion folder watcher.
  enabled: false

  # mountPath is the path inside the Papra container where the share is mounted.
  mountPath: /app/ingestion

  # existingClaimName uses a pre-existing PVC instead of creating one.
  # When set, claim and volume below are ignored entirely.
  existingClaimName: ""

  # claim configures the PVC created by this chart.
  # Ignored when existingClaimName is set.
  claim:
    # storageClassName is the StorageClass to use. Empty string uses the cluster default.
    storageClassName: ""
    # accessModes are the PVC access modes.
    accessModes:
      - ReadWriteOnce
    # size is the requested storage capacity.
    size: 10Gi
    # volumeName explicitly binds the PVC to a specific PV by name.
    # Leave empty for dynamic provisioning.
    # Automatically set to the chart-managed PV when volume.nfs.server is configured.
    volumeName: ""

  # volume creates a static PersistentVolume bound to the chart's PVC.
  # Useful for NFS or other manually-provisioned shares.
  # Set volume.nfs.server to enable PV creation; leave empty to skip.
  volume:
    nfs:
      # server is the NFS server hostname or IP. Leave empty to skip PV creation.
      server: ""
      # path is the exported NFS path.
      path: ""
      mountOptions:
        - hard
        - nfsvers=4

  # usePolling enables polling-based file watching instead of inotify.
  # Must be true for NFS, SMB, and other network filesystems.
  usePolling: true

  # pollingIntervalMs is the file-check interval in milliseconds when usePolling is true.
  pollingIntervalMs: 30000

  # postProcessingStrategy controls what Papra does with files after ingestion.
  # One of: "delete", "move"
  postProcessingStrategy: delete
