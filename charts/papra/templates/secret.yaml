{{- if eq .Values.secret.mode "external" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "papra.secretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "papra.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: auth-secret
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef.key }}
        property: {{ .Values.externalSecret.remoteRef.property }}
{{- else if eq .Values.secret.mode "create" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.secretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth-secret: {{ required "secret.authSecret is required when secret.mode is \"create\"" .Values.secret.authSecret | quote }}
{{- end }}
{{- if eq .Values.config.storage.driver "s3" }}
{{- if eq .Values.s3Secret.mode "external" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "papra.s3SecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.s3ExternalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.s3ExternalSecret.secretStoreName }}
    kind: {{ .Values.s3ExternalSecret.secretStoreKind }}
  target:
    name: {{ include "papra.s3SecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: {{ .Values.s3ExternalSecret.remoteRef.key }}
        property: {{ .Values.s3ExternalSecret.remoteRef.accessKeyIdProperty }}
    - secretKey: secret-access-key
      remoteRef:
        key: {{ .Values.s3ExternalSecret.remoteRef.key }}
        property: {{ .Values.s3ExternalSecret.remoteRef.secretAccessKeyProperty }}
{{- else if eq .Values.s3Secret.mode "create" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.s3SecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ required "s3Secret.accessKeyId is required when s3Secret.mode is \"create\"" .Values.s3Secret.accessKeyId | quote }}
  secret-access-key: {{ required "s3Secret.secretAccessKey is required when s3Secret.mode is \"create\"" .Values.s3Secret.secretAccessKey | quote }}
{{- end }}
{{- end }}
{{- if .Values.config.auth.customOAuthProviders }}
{{- if eq .Values.oidcSecret.mode "external" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "papra.oidcSecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.oidcExternalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.oidcExternalSecret.secretStoreName }}
    kind: {{ .Values.oidcExternalSecret.secretStoreKind }}
  target:
    name: {{ include "papra.oidcSecretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.config.auth.customOAuthProviders }}
    - secretKey: {{ .id }}-client-secret
      remoteRef:
        key: {{ $.Values.oidcExternalSecret.remoteRef.key }}
        property: {{ index $.Values.oidcExternalSecret.remoteRef.clientSecretProperties .id }}
    {{- end }}
{{- else if eq .Values.oidcSecret.mode "create" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.oidcSecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.config.auth.customOAuthProviders }}
  {{ .id }}-client-secret: {{ required (printf "oidcSecret.clientSecrets.%s is required when oidcSecret.mode is \"create\"" .id) (index $.Values.oidcSecret.clientSecrets .id) | quote }}
  {{- end }}
{{- end }}
{{- end }}
