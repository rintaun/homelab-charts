{{- if .Values.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.secretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth-secret: {{ required "secret.authSecret is required when secret.create is true" .Values.secret.authSecret | quote }}
{{- end }}
{{- if and (eq .Values.config.storage.driver "s3") .Values.s3Secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.s3SecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ required "s3Secret.accessKeyId is required when s3Secret.create is true" .Values.s3Secret.accessKeyId | quote }}
  secret-access-key: {{ required "s3Secret.secretAccessKey is required when s3Secret.create is true" .Values.s3Secret.secretAccessKey | quote }}
{{- end }}
{{- if and .Values.config.auth.customOAuthProviders .Values.oidcSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.oidcSecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.config.auth.customOAuthProviders }}
  {{ .id }}-client-secret: {{ required (printf "oidcSecret.clientSecrets.%s is required when oidcSecret.create is true" .id) (index $.Values.oidcSecret.clientSecrets .id) | quote }}
  {{- end }}
{{- end }}
