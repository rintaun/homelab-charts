{{- if .Values.webhookBridge.enabled }}
{{- if .Values.webhookBridge.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papra.webhookBridgeSecretName" . }}
  labels:
    {{- include "papra.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-bridge
type: Opaque
stringData:
  forwardemail-webhook-key: {{ .Values.webhookBridge.secret.forwardEmailWebhookKey | quote }}
  webhook-secret: {{ required "webhookBridge.secret.webhookSecret is required when webhookBridge.secret.create is true" .Values.webhookBridge.secret.webhookSecret | quote }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "papra.fullname" . }}-webhook-bridge
  labels:
    {{- include "papra.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-bridge
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhookBridge.port }}
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "papra.selectorLabels" . | nindent 4 }}
{{- end }}
