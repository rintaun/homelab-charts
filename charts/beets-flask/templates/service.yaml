---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beets-flask.fullname" . }}
  labels:
    {{- include "beets-flask.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "beets-flask.selectorLabels" . | nindent 4 }}
    component: web-server
