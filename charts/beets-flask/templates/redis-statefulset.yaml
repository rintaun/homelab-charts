{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beets-flask.fullname" . }}-redis
  labels:
    {{- include "beets-flask.labels" . | nindent 4 }}
    component: redis
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    {{- include "beets-flask.selectorLabels" . | nindent 4 }}
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "beets-flask.fullname" . }}-redis
  labels:
    {{- include "beets-flask.labels" . | nindent 4 }}
    component: redis
spec:
  serviceName: {{ include "beets-flask.fullname" . }}-redis
  replicas: {{ .Values.redis.replica.count }}
  selector:
    matchLabels:
      {{- include "beets-flask.selectorLabels" . | nindent 6 }}
      component: redis
  template:
    metadata:
      labels:
        {{- include "beets-flask.selectorLabels" . | nindent 8 }}
        component: redis
    spec:
      serviceAccountName: {{ include "beets-flask.serviceAccountName" . }}
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          {{- include "beets-flask.labels" . | nindent 10 }}
      spec:
        {{- with .Values.redis.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
{{- end }}
