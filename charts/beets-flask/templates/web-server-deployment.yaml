apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beets-flask.fullname" . }}-web
  labels:
    {{- include "beets-flask.labels" . | nindent 4 }}
    component: web-server
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
spec:
  replicas: {{ .Values.webServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "beets-flask.selectorLabels" . | nindent 6 }}
      component: web-server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "beets-flask.selectorLabels" . | nindent 8 }}
        component: web-server
    spec:
      serviceAccountName: {{ include "beets-flask.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "beets-flask.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "=== Starting web server ==="
              exec uvicorn beets_flask.server.app:create_app \
                --host 0.0.0.0 \
                --port 5001 \
                --workers 4
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: USER_ID
              value: {{ .Values.userId | quote }}
            - name: GROUP_ID
              value: {{ .Values.groupId | quote }}
            - name: REDIS_HOST
              value: "{{ include "beets-flask.fullname" . }}-redis"
            - name: REDIS_PORT
              value: "6379"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.webServer.resources | nindent 12 }}
          {{- if .Values.webServer.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.webServer.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.webServer.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.webServer.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.webServer.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.webServer.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.webServer.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.webServer.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.webServer.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.webServer.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: config-data
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config-data
          persistentVolumeClaim:
            claimName: {{ include "beets-flask.fullname" . }}-config
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "beets-flask.mediaClaimName" . }}
