# nameOverride replaces the chart name in resource names when set.
nameOverride: ""
# fullnameOverride replaces the fully-qualified release name when set.
fullnameOverride: ""

image:
  # repository is the container image repository.
  repository: ghcr.io/rintaun/beets-flask
  # tag overrides the chart appVersion when set.
  tag: ""
  # digest pins to an immutable image reference. Prepend sha256: or omit the prefix.
  digest: ""
  # pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

redis:
  # enabled: true deploys a Redis StatefulSet for the job queue.
  # Set to false to use an external Redis instance.
  enabled: true

  replica:
    # count is the number of Redis replicas.
    count: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    # enabled: true creates a PVC for Redis persistence.
    enabled: true
    # size is the requested storage capacity.
    size: 5Gi
    # storageClass is the Kubernetes StorageClass to use.
    storageClass: ""

webServer:
  # replicaCount is the number of web server pod replicas.
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # livenessProbe checks if the web server is alive.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # readinessProbe checks if the web server is ready to accept traffic.
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

previewWorkers:
  # replicaCount is the number of preview worker pods.
  # Can be scaled up for faster preview generation.
  replicaCount: 2

  # maxReplicas sets the upper limit for HPA (if autoscaling is enabled).
  maxReplicas: 5

  # autoscaling enables Horizontal Pod Autoscaler for preview workers.
  autoscaling:
    enabled: false
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

importWorker:
  # Import worker replicas are hardcoded to 1 in the template.
  # SQLite does not support concurrent writes. Import jobs must be serialized.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

watchdogWorker:
  # Watchdog worker replicas are hardcoded to 1 in the template.
  # File system watching is not parallelizable.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

serviceAccount:
  # create specifies whether a ServiceAccount should be created.
  create: true
  # annotations to add to the ServiceAccount.
  annotations: {}
  # name overrides the generated name when set.
  name: ""

# podAnnotations are extra annotations added to the pod.
podAnnotations: {}

# podSecurityContext sets the security context for the pod.
# Note: runAsNonRoot is NOT set because the container entrypoint runs as root
# and switches to the USER_ID/GROUP_ID user internally (Linuxserver.io style init).
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# securityContext sets the security context for the beets-flask container.
# readOnlyRootFilesystem is false because the container writes to system paths during startup.
# SETUID/SETGID/CHOWN capabilities are required for user switching via USER_ID/GROUP_ID.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
    add: ["SETUID", "SETGID", "CHOWN"]

# timezone sets the TZ environment variable for the container.
timezone: "UTC"

# userId sets the USER_ID environment variable, controlling which UID the app runs as.
userId: 1000

# groupId sets the GROUP_ID environment variable, controlling which GID the app runs as.
groupId: 1000

# extraEnv is a list of additional environment variables for the beets-flask container.
# Useful for injecting secrets (e.g. API keys) via secretKeyRef.
# Example:
#   extraEnv:
#     - name: ACOUSTID_APIKEY
#       valueFrom:
#         secretKeyRef:
#           name: beets-flask-secrets
#           key: acoustid-api-key
extraEnv: []

# extraPipPackages is a list of additional pip packages to install at pod startup,
# before the main container starts. Use this for plugins or small Python extras
# that are not bundled in the container image. Prefer the Docker image build-time
# BEETS_VERSION override for changing the core beets version.
# Example:
#   extraPipPackages:
#     - "beets-alternatives"
extraPipPackages: []

# beetsConfig is the full beets config.yaml rendered into a ConfigMap.
# The init container copies this into /config/beets/config.yaml at startup.
#
# Paths must be consistent with the volume mounts:
#   /config/beets/library.db    – beets SQLite database (on config PVC)
#   /media/music                – organized music library (on media volume)
#
# Plugin notes:
#   chroma    – requires fpcalc and a free AcoustID API key (https://acoustid.org/login).
#               Set ACOUSTID_APIKEY via extraEnv or add chroma: auto: yes
#   lastgenre – set lastfm_key if you want Last.fm genre lookups
beetsConfig:
  library: /config/beets/library.db
  directory: /media/music
  import:
    move: true
    quiet: true
    timid: false
  plugins:
    - fetchart
    - embedart
    - lastgenre
    - chroma
  paths:
    default: $albumartist/$year - $album/$track $title
    singleton: Non-Album/$artist/$title
    comp: Compilations/$year - $album/$disc-$track $title
  fetchart:
    auto: true
  embedart:
    auto: true
  lastgenre:
    auto: true

# beetsFlaskConfig is the beets-flask config.yaml rendered into a ConfigMap.
# The init container copies this into /config/beets-flask/config.yaml at startup.
#
# Add inbox folder paths to gui.inbox.folders to have beets-flask monitor directories
# for new music files to import.
beetsFlaskConfig:
  gui:
    num_preview_workers: 4
    library:
      readonly: no
      artist_separators: [",", ";", "&"]
    terminal:
      start_path: "/repo"
    inbox:
      ignore: "_use_beets_ignore"
      debounce_before_autotag: 30
      concat_nested_folders: yes
      expand_files: no
      # folders is a named dict of inbox configurations. Each key is an arbitrary inbox
      # name. autotag can be "auto", "preview", or false.
      # Example:
      #   folders:
      #     Inbox:
      #       name: "My Inbox"
      #       path: "/media/music-import"
      #       autotag: "preview"
      folders: {}

ingress:
  # host is the fully-qualified hostname for the ingress. Leave empty to disable ingress.
  host: ""
  # className is the IngressClass to use. Empty string uses the cluster default IngressClass.
  className: ""
  # annotations are added to the Ingress resource metadata.
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/cloudflare: "true"

persistence:
  # config is the PVC for the /config directory (beets and beets-flask config + SQLite databases).
  config:
    # storageClass is the Kubernetes StorageClass to use. Empty string uses the cluster default.
    storageClass: ""
    # size is the storage capacity requested.
    size: 1Gi

  # media configures the volume for the full media share (music library + import staging).
  media:
    # existingClaimName uses a pre-existing PVC instead of creating one.
    # When set, claim and volume below are ignored entirely.
    existingClaimName: ""

    # claim configures the PVC created by this chart.
    # Ignored when existingClaimName is set.
    claim:
      # storageClassName is the StorageClass to use. Empty string uses the cluster default.
      storageClassName: ""
      # accessModes are the PVC access modes.
      accessModes:
        - ReadWriteMany
      # size is the requested storage capacity.
      size: 1Ti
      # volumeName explicitly binds the PVC to a specific PV.
      # Automatically set when volume.nfs.server is configured. Leave empty for dynamic provisioning.
      volumeName: ""

    # volume creates a static PersistentVolume bound to the chart's media PVC.
    # Set volume.nfs.server to enable PV creation; leave empty to skip.
    volume:
      nfs:
        # server is the NFS server hostname or IP. Leave empty to skip PV creation.
        server: ""
        # path is the exported NFS path.
        path: ""
        mountOptions:
          - hard
          - nfsvers=4
