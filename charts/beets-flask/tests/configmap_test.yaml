suite: beets-flask configmap tests
templates:
  - configmap.yaml
tests:
  - it: should render two ConfigMaps
    asserts:
      - hasDocuments:
          count: 2

  - it: should render a beets ConfigMap
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-beets-flask-beets-config

  - it: should render a beets-flask ConfigMap
    documentIndex: 1
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-beets-flask-beets-flask-config

  - it: should include config.yaml key in beets ConfigMap
    documentIndex: 0
    asserts:
      - isNotEmpty:
          path: data["config.yaml"]

  - it: should include config.yaml key in beets-flask ConfigMap
    documentIndex: 1
    asserts:
      - isNotEmpty:
          path: data["config.yaml"]
