suite: actual-budget secret tests
templates:
  - secret.yaml
tests:
  - it: should not render Secret when create is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Secret when create is true
    set:
      secret.create: true
      secret.serverPassword: s3cr3t
    asserts:
      - isKind:
          of: Secret

  - it: should include server-password key when provided
    set:
      secret.create: true
      secret.serverPassword: s3cr3t
    asserts:
      - equal:
          path: stringData.server-password
          value: s3cr3t
