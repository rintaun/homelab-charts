{{- if .Values.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "actual-budget.secretName" . }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.oidcClientSecret }}
  oidc-client-secret: {{ .Values.secret.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secret.serverPassword }}
  server-password: {{ .Values.secret.serverPassword | quote }}
  {{- end }}
{{- end }}
