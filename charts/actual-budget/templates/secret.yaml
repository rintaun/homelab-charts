{{- if eq .Values.secret.mode "external" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "actual-budget.fullname" . }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "actual-budget.fullname" . }}
    creationPolicy: Owner
  data:
    {{- if .Values.externalSecret.remoteRef.oidcClientSecretProperty }}
    - secretKey: oidc-client-secret
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef.key }}
        property: {{ .Values.externalSecret.remoteRef.oidcClientSecretProperty }}
    {{- end }}
    {{- if .Values.externalSecret.remoteRef.serverPasswordProperty }}
    - secretKey: server-password
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef.key }}
        property: {{ .Values.externalSecret.remoteRef.serverPasswordProperty }}
    {{- end }}
{{- else if eq .Values.secret.mode "create" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "actual-budget.fullname" . }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.oidcClientSecret }}
  oidc-client-secret: {{ .Values.secret.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secret.serverPassword }}
  server-password: {{ .Values.secret.serverPassword | quote }}
  {{- end }}
{{- end }}
